<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomegranate Disease AI</title>
    <!-- Tailwind CSS for mobile-first styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #ef4444; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">
    
    <div class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-red-700 mb-2">Pomegranate Care AI</h1>
            <p class="text-gray-600">Upload a leaf/fruit image and current weather for an instant health assessment.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Left Column: Input Form -->
            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100">
                <form id="predictionForm" class="space-y-6">
                    
                    <!-- Image Upload -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Upload Image</label>
                        <div class="flex items-center justify-center w-full">
                            <label for="imageInput" class="flex flex-col items-center justify-center w-full h-48 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 relative overflow-hidden">
                                <div class="flex flex-col items-center justify-center pt-5 pb-6" id="uploadPlaceholder">
                                    <svg class="w-8 h-8 mb-4 text-gray-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/></svg>
                                    <p class="mb-2 text-sm text-gray-500"><span class="font-semibold">Click to upload</span> or drag and drop</p>
                                </div>
                                <img id="imagePreview" class="absolute inset-0 w-full h-full object-cover hidden" alt="Image Preview">
                                <input id="imageInput" type="file" accept="image/*" class="hidden" required />
                            </label>
                        </div>
                    </div>

                    <!-- Weather Inputs -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Temperature (°C)</label>
                            <input type="number" id="tempInput" step="0.1" placeholder="e.g. 28" class="w-full border-gray-300 rounded-lg shadow-sm p-3 border focus:ring-red-500 focus:border-red-500" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Humidity (%)</label>
                            <input type="number" id="humInput" step="0.1" placeholder="e.g. 65" class="w-full border-gray-300 rounded-lg shadow-sm p-3 border focus:ring-red-500 focus:border-red-500" required>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="submitBtn" class="w-full bg-red-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-red-700 transition flex justify-center items-center">
                        <span>Analyze Plant</span>
                        <div id="loadingSpinner" class="loader border-4 border-white/20 border-t-white rounded-full w-5 h-5 ml-2 hidden"></div>
                    </button>
                </form>
            </div>

            <!-- Right Column: Results -->
            <div id="resultsCard" class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 hidden flex-col justify-center">
                <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Analysis Results</h2>
                
                <div class="mb-4">
                    <p class="text-sm text-gray-500 uppercase tracking-wide">Detected Condition</p>
                    <p id="resDisease" class="text-2xl font-bold text-gray-800"></p>
                </div>
                
                <div class="mb-4">
                    <p class="text-sm text-gray-500 uppercase tracking-wide">Environmental Risk</p>
                    <p id="resRisk" class="text-xl font-bold"></p>
                </div>

                <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <p class="text-sm text-blue-800 uppercase tracking-wide font-bold mb-1">Expert Advice</p>
                    <p id="resAdvice" class="text-gray-700 text-sm leading-relaxed"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Image Preview Logic ---
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');

        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.classList.remove('hidden');
                    uploadPlaceholder.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        // --- 2. Form Submission & API Call ---
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI State
            const btn = document.getElementById('submitBtn');
            const spinner = document.getElementById('loadingSpinner');
            const resultsCard = document.getElementById('resultsCard');
            
            btn.disabled = true;
            spinner.classList.remove('hidden');
            resultsCard.classList.add('hidden');

            // Prepare Data
            const formData = new FormData();
            formData.append('file', imageInput.files[0]);
            formData.append('temperature', document.getElementById('tempInput').value);
            formData.append('humidity', document.getElementById('humInput').value);

            try {
                // Send to Flask backend
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if(data.error) {
                    alert("Error: " + data.error);
                } else {
                    // Populate UI with results
                    document.getElementById('resDisease').innerText = data.disease;
                    
                    const riskEl = document.getElementById('resRisk');
                    riskEl.innerText = data.risk;
                    riskEl.className = `text-xl font-bold ${data.risk_color}`;
                    
                    document.getElementById('resAdvice').innerText = data.advice;
                    
                    // Show results card
                    resultsCard.classList.remove('hidden');
                    resultsCard.classList.add('flex');
                }
            } catch (error) {
                alert("Server error. Make sure the Flask backend is running.");
            } finally {
                // Reset UI state
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
